<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
    <div class="container">

    

    <h1>Patient Registration Form</h1>

    <form>
        <fieldset>
            <legend> Patient Personal Information </legend>
        <table>
            <tr>
                <td><label for="PatientName">Patient Name:</label></td>
                <td>
                    <input type="text" id="PatientName" name="PatientName"
                           placeholder="Enter Your Name" required>
                </td>
            </tr>

            <tr>
                <td><label for="PatientAge">Patient Age:</label></td>
                <td>
                    <input type="number" id="PatientAge" name="PatientAge" placeholder="Enter your Age">
                </td>
            </tr>

            <tr>
                <td><label for="PatientEmail">Patient Email:</label></td>
                <td>
                    <input type="email" id="PatientEmail" name="PatientEmail" placeholder="Enter your Email">
                </td>
            </tr>

            <tr>
                <td>Patient Gender:</td>
                <td>
                    <input type="radio" id="PatientMale" name="Gender" value="Male">
                    <label for="PatientMale">Male</label>
                    <input type="radio" id="PatientFemale" name="Gender" value="Female">
                    <label for="PatientFemale">Female</label>
                </td>
            </tr>

            <tr>
                <td><label for="PatientFile">Patient Prescription:</label></td>
                <td>
                    <input type="file" id="PatientFile" name="PatientFile">
                </td>
            </tr>

            <tr>
                <td><label for="DOB">Patient DOB:</label></td>
                <td>
                    <input type="date" id="DOB" name="DOB">
                </td>
            </tr>

            <tr>
                <td><label for="Address">Patient Address:</label></td>
                <td>
                    <textarea id="Address" name="Address" rows="5" cols="20" Style= "resize:none" placeholder="Your Text Here"></textarea>
                </td>
            </tr>

            <tr>
                <td> <label for= "patientcitizen"> Citizenship:  </label></td>
                <td>
                    <select id="country"> 
                    <option id ="Default" value="Default"> -------- Select Country ----- </option>
                    <option id ="BD" value="Bangladesh"> Bangladesh </option>
                    <option id ="UK" value="UnitedKingdom"> United Kingdom </option>
                    <option id ="Brazil" value="Brazil"> Brazil </option>
                    </select>
                </td>
            </tr>
            <tr>
                <td> <label for="DeptDoctor"> Selected Doctor Dept: </label></td>
                <td>
                    <input type ="checkbox" id="Medicine" name="DeptDoctor">
                    <label for ="Medicine"> Medicine </label>
                    <br>
                    <input type ="checkbox" id="Cardiac" name="DeptDoctor">
                    <label for ="Cardiac"> Cardiac </label>
                    <br>
                    <input type ="checkbox" id="Neorology" name="DeptDoctor">
                    <label for ="Neorology"> Neorology </label>

                </td>
            </tr>



        </table>
        </fieldset>

        <fieldset>
            <legend> User Profile </legend>
            <table>
                <tr> 
                <td> <label for="username"> User Name: </label> </td>
                <td> <input type="text" id="username" name="username"> </td>
                </tr>
                <tr>
                    <td> <label for="password"> Password: </label> </td>
                    <td> <input type="password" id="password" name="password"> </td>
                </tr>

                <tr>
                    <td> <label for="Conpassword">Confirm  Password: </label> </td>
                    <td> <input type="Conpassword" id="Conpassword" name="Conpassword"> </td>
                </tr>
            </table>
        </fieldset>
       
        <input type="checkbox" id="Condition" name="Condition">
        <label for="Condition"> <font color= "red"> I Agree Terms and Condition * </font></label>
        <br><br>
        <input type="submit" id="submit" name="submit" value="Signup">
        <input type="reset" id="reset" name="reset" value="Reset">
        
            
        
    </form>
</div>
</body>
</html>
